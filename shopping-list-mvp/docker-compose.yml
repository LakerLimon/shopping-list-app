services:
  db:
    image: postgres:16-alpine
    container_name: shopping_mvp_db
    environment:
      POSTGRES_DB: shopping_mvp
      POSTGRES_USER: shopping_user
      POSTGRES_PASSWORD: shopping_pass
    ports:
      - "5433:5432"
    volumes:
      - shopping_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopping_user -d shopping_mvp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: shopping_mvp_api
    env_file:
      - ./backend/.env.example
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  shopping_pgdata:
